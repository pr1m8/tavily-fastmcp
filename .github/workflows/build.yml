name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-pdm
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: pdm install -G test -G quality

      - name: Build distributions
        run: pdm build

      - name: Verify built metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error
